<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de pedidos — Adele Collections Accesorios</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body admin-body--dashboard">

<header class="admin-topbar">
  <div class="brand">
    <span class="brand__mark">✦</span>
    <span class="brand__name">Panel — Adele Collections Accesorios</span>
  </div>
  <nav class="admin-nav">
    <a href="dashboard.html" class="admin-nav__link admin-nav__link--activo">Pedidos</a>
    <a href="productos.html" class="admin-nav__link">Productos</a>
    <button id="btnLogout" class="btn btn--ghost">Cerrar sesión</button>
  </nav>
</header>

<main class="admin-main">
  <div class="admin-filtros">
    <button class="chip chip--activo" data-estado="todos">Todos</button>
    <button class="chip" data-estado="pendiente">Pendientes</button>
    <button class="chip" data-estado="pago_verificado">Pago verificado</button>
    <button class="chip" data-estado="en_preparacion">En preparación</button>
    <button class="chip" data-estado="enviado">Enviados</button>
    <button class="chip" data-estado="entregado">Entregados</button>
    <button class="chip" data-estado="cancelado">Cancelados</button>
  </div>

  <div id="listaPedidos" class="lista-pedidos">
    <p class="estado-vacio">Cargando pedidos…</p>
  </div>
</main>

<!-- Modal de detalle de pedido -->
<div class="overlay" id="overlayModal"></div>
<div class="modal-pedido" id="modalPedido">
  <div class="modal-pedido__head">
    <h2 id="modalTitulo">Pedido</h2>
    <button id="cerrarModal" aria-label="Cerrar">✕</button>
  </div>
  <div class="modal-pedido__body" id="modalBody"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/admin.js"></script>
</body>
</html>
