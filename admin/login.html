<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso administrador — Adele Collections Accesorios</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body">

<div class="login-box">
  <a href="../index.html" class="brand" style="justify-content:center; margin-bottom:1.5rem;">
    <span class="brand__mark">✦</span>
    <span class="brand__name">Adele Collections Accesorios</span>
  </a>
  <h1>Acceso administrador</h1>
  <form id="formLogin">
    <div class="campo">
      <label for="email">Correo</label>
      <input type="email" id="email" required>
    </div>
    <div class="campo">
      <label for="password">Contraseña</label>
      <input type="password" id="password" required>
    </div>
    <button type="submit" class="btn btn--gold btn--full">Ingresar</button>
    <p class="login-error" id="loginError"></p>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", async () => {
    // Si ya hay sesión activa, ir directo al dashboard
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) window.location.href = "dashboard.html";

    document.getElementById("formLogin").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorEl = document.getElementById("loginError");
      errorEl.textContent = "";

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        errorEl.textContent = "Correo o contraseña incorrectos.";
        return;
      }
      window.location.href = "dashboard.html";
    });
  });
</script>
</body>
</html>
