<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos — Adele Collections Accesorios</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body admin-body--dashboard">

<header class="admin-topbar">
  <div class="brand">
    <span class="brand__mark">✦</span>
    <span class="brand__name">Panel — Adele Collections Accesorios</span>
  </div>
  <nav class="admin-nav">
    <a href="dashboard.html" class="admin-nav__link">Pedidos</a>
    <a href="productos.html" class="admin-nav__link admin-nav__link--activo">Productos</a>
    <button id="btnLogout" class="btn btn--ghost">Cerrar sesión</button>
  </nav>
</header>

<main class="admin-main">
  <div class="admin-filtros" style="justify-content:space-between; display:flex;">
    <h1 style="font-family:var(--fuente-display); margin:0;">Productos</h1>
    <button class="btn btn--gold" id="btnNuevoProducto">+ Nuevo producto</button>
  </div>

  <div id="listaProductosAdmin" class="lista-productos-admin">
    <p class="estado-vacio">Cargando productos…</p>
  </div>
</main>

<!-- Modal de crear/editar producto -->
<div class="overlay" id="overlayModal"></div>
<div class="modal-pedido" id="modalProducto">
  <div class="modal-pedido__head">
    <h2 id="modalProductoTitulo">Nuevo producto</h2>
    <button id="cerrarModalProducto" aria-label="Cerrar">✕</button>
  </div>
  <div class="modal-pedido__body">
    <form id="formProducto">
      <input type="hidden" id="productoId">
      <div class="campo">
        <label for="pNombre">Nombre</label>
        <input type="text" id="pNombre" required>
      </div>
      <div class="campo">
        <label for="pDescripcion">Descripción</label>
        <textarea id="pDescripcion" rows="2"></textarea>
      </div>
      <div class="campo-fila">
        <div class="campo">
          <label for="pPrecio">Precio (USD)</label>
          <input type="number" id="pPrecio" step="0.01" min="0" required>
        </div>
        <div class="campo">
          <label for="pStock">Stock</label>
          <input type="number" id="pStock" min="0" required>
        </div>
      </div>
      <div class="campo">
        <label for="pCategoria">Categoría</label>
        <select id="pCategoria" required></select>
      </div>
      <div class="campo">
        <label for="pImagen">Imagen del producto</label>
        <input type="file" id="pImagen" accept="image/*">
        <p class="footer__muted" id="pImagenActual" style="font-size:.78rem; margin-top:.3rem;"></p>
      </div>
      <div class="campo">
        <label><input type="checkbox" id="pActivo" checked style="width:auto; display:inline-block;"> Visible en la tienda</label>
      </div>
      <button type="submit" class="btn btn--gold btn--full">Guardar producto</button>
      <p class="checkout__aviso" id="avisoProducto"></p>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/admin-productos.js"></script>
</body>
</html>
