<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finalizar compra — Bisutería Fanny</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/checkout.css">
</head>
<body>

<header class="topbar">
  <div class="topbar__inner">
    <a href="index.html" class="brand">
      <span class="brand__mark">✦</span>
      <span class="brand__name">Bisutería Fanny</span>
    </a>
    <a href="index.html" class="btn btn--ghost">← Seguir comprando</a>
  </div>
</header>

<main class="checkout">
  <div class="checkout__inner">

    <!-- ===== COLUMNA IZQUIERDA: FORMULARIO ===== -->
    <section class="checkout__form">
      <h1>Finalizar compra</h1>

      <div id="checkoutVacio" class="estado-vacio" style="display:none;">
        Tu carrito está vacío. <a href="index.html" style="color:var(--oro-claro)">Vuelve al catálogo</a>.
      </div>

      <form id="formPedido">
        <h2 class="checkout__subtitulo">1. Tus datos</h2>
        <div class="campo">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" required placeholder="Ej. María Pérez">
        </div>
        <div class="campo-fila">
          <div class="campo">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" required placeholder="tucorreo@ejemplo.com">
          </div>
          <div class="campo">
            <label for="telefono">Teléfono / WhatsApp</label>
            <input type="tel" id="telefono" required placeholder="09XXXXXXXX">
          </div>
        </div>
        <div class="campo">
          <label for="direccion">Dirección de entrega</label>
          <input type="text" id="direccion" required placeholder="Calle, número, referencia">
        </div>
        <div class="campo">
          <label for="ciudad">Ciudad</label>
          <input type="text" id="ciudad" required placeholder="Ej. Quito">
        </div>

        <h2 class="checkout__subtitulo">2. Método de pago</h2>
        <div class="metodos-pago-select" id="metodosPagoSelect">
          <label class="metodo-opcion">
            <input type="radio" name="metodoPago" value="paypal" checked>
            <span class="metodo-opcion__card">
              <strong>PayPal</strong>
              <small>Pago inmediato y seguro en línea</small>
            </span>
          </label>
          <label class="metodo-opcion">
            <input type="radio" name="metodoPago" value="transferencia">
            <span class="metodo-opcion__card">
              <strong>Transferencia bancaria</strong>
              <small>Pichincha, Guayaquil, Bolivariano, Pacífico, Internacional, Produbanco</small>
            </span>
          </label>
          <label class="metodo-opcion">
            <input type="radio" name="metodoPago" value="contra_reembolso">
            <span class="metodo-opcion__card">
              <strong>Contra reembolso</strong>
              <small>Pagas en efectivo al recibir</small>
            </span>
          </label>
        </div>

        <!-- Panel dinámico según método elegido -->
        <div id="panelMetodo"></div>

        <h2 class="checkout__subtitulo">3. Confirmar pedido</h2>
        <textarea id="notas" placeholder="¿Algo que debamos saber sobre tu pedido o entrega? (opcional)" rows="3"></textarea>

        <button type="submit" class="btn btn--gold btn--full" id="btnConfirmar">Confirmar pedido</button>
        <p class="checkout__aviso" id="avisoEnvio"></p>
      </form>

      <div id="confirmacionPedido" style="display:none;" class="confirmacion">
        <h2>¡Pedido recibido! 🎉</h2>
        <p>Tu código de pedido es <strong id="codigoPedidoMostrado"></strong>.</p>
        <p id="mensajeSegunMetodo"></p>
        <a href="index.html" class="btn btn--gold">Volver a la tienda</a>
      </div>
    </section>

    <!-- ===== COLUMNA DERECHA: RESUMEN ===== -->
    <aside class="checkout__resumen">
      <h2>Resumen del pedido</h2>
      <div id="resumenItems"></div>
      <div class="resumen-totales">
        <div class="resumen-fila"><span>Subtotal</span><span id="resSubtotal">$0.00</span></div>
        <div class="resumen-fila"><span>Envío</span><span id="resEnvio">$0.00</span></div>
        <div class="resumen-fila resumen-fila--total"><span>Total</span><span id="resTotal">$0.00</span></div>
      </div>
    </aside>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/carrito.js"></script>
<script src="assets/js/checkout.js"></script>
</body>
</html>
